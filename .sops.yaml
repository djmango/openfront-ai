creation_rules:
  - path_regex: secrets/.*\.enc\.(yaml|json|env)$
    # Two recipients: the persistent Cursor agent age key (also documented in
    # secrets/secrets.yaml; configure its identity as SOPS_AGE_KEY) and
    # sulaiman.ghori@outlook.com's personal SSH ed25519 key (age natively
    # supports ssh-ed25519/ssh-rsa public keys as recipients, no conversion
    # needed) - so either party can decrypt independently of the other.
    age: >-
      age1s005jlrdv2ctpkfal8dn5dxrwzgt5gzdulgrqgmltm8uwgh0n4ssg4sy6e,
      ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK4RmXrS61fSaWojx1aK9oB1N1LzllAkOpcLrcXsUsVz sulaiman.ghori@outlook.com
